###############################################################################
# deploy.yml — Runs on push to main
# Builds everything, applies Terraform, deploys frontend to S3 + CloudFront.
###############################################################################

name: "Deploy"

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infrastructure/**"
      - "frontend/**"
      - ".github/**"

permissions:
  contents: read

env:
  AWS_REGION: us-east-2
  TF_WORKING_DIR: infrastructure
  TF_VAR_FILE: environments/dev/terraform.tfvars

jobs:
  deploy:
    name: Deploy Infrastructure + Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Python + Lambda layer deps ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Lambda layer dependencies
        working-directory: .
        run: |
          rm -rf backend/lambda_tasks/layer/python
          mkdir -p backend/lambda_tasks/layer/python
          pip install \
            -r backend/lambda_tasks/requirements.txt \
            -t backend/lambda_tasks/layer/python \
            --upgrade \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.9 \
            --only-binary=:all:

      # ---- AWS credentials ----
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- Terraform Apply ----
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Force unlock Terraform state if locked
        run: |
          # Check if lock exists in DynamoDB
          LOCK_EXISTS=$(aws dynamodb get-item \
            --table-name lambda-task-cloud-tf-state-lock \
            --key '{"LockID":{"S":"lambda-task-cloud-tf-state-557187998171/lambda-task-cloud/terraform.tfstate"}}' \
            --query 'Item.LockID.S' \
            --output text 2>/dev/null || echo "")
          
          if [ ! -z "$LOCK_EXISTS" ] && [ "$LOCK_EXISTS" != "None" ]; then
            # Extract the lock ID from the Info field
            LOCK_ID=$(aws dynamodb get-item \
              --table-name lambda-task-cloud-tf-state-lock \
              --key '{"LockID":{"S":"lambda-task-cloud-tf-state-557187998171/lambda-task-cloud/terraform.tfstate"}}' \
              --output json 2>/dev/null | jq -r '.Item.Info.S' | jq -r '.ID' || echo "")
            
            if [ ! -z "$LOCK_ID" ] && [ "$LOCK_ID" != "null" ]; then
              echo "Found lock ID: $LOCK_ID. Attempting to unlock..."
              terraform force-unlock -force "$LOCK_ID" || echo "Failed to unlock, will try to proceed"
            fi
          else
            echo "No active lock found"
          fi
        continue-on-error: true

      - name: Import existing CloudFront OAC if present
        run: |
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query 'OriginAccessControlList.Items[?Name==`lambda-task-cloud-dev-oac`].Id' \
            --output text 2>/dev/null || echo "")

          if [ ! -z "$OAC_ID" ] && [ "$OAC_ID" != "None" ]; then
            echo "Found existing OAC: $OAC_ID. Importing into Terraform state..."
            terraform import -var-file=${{ env.TF_VAR_FILE }} \
              module.frontend.aws_cloudfront_origin_access_control.frontend "$OAC_ID" || echo "Import failed or already in state"
          else
            echo "No existing OAC found"
          fi
        continue-on-error: true

      - name: Terraform Apply
        run: terraform apply -var-file=${{ env.TF_VAR_FILE }} -auto-approve

      # ---- Extract Terraform outputs ----
      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
          echo "api_gateway_url=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw frontend_s3_bucket)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw frontend_cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      # ---- Node + Frontend build with real API URL ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          rm -rf node_modules
          npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ steps.tf_outputs.outputs.api_gateway_url }}
        run: npm run build

      # ---- Deploy frontend to S3 + invalidate CloudFront ----
      - name: Sync frontend to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ steps.tf_outputs.outputs.s3_bucket }} \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cloudfront_id }} \
            --paths "/*"

      # ---- Summary ----
      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | ${{ steps.tf_outputs.outputs.api_gateway_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://$(terraform output -raw frontend_url | sed 's|https://||') |" >> $GITHUB_STEP_SUMMARY

      # ---- Cleanup on failure ----
      - name: Clean up state lock on failure
        if: failure() || cancelled()
        run: |
          LOCK_EXISTS=$(aws dynamodb get-item \
            --table-name lambda-task-cloud-tf-state-lock \
            --key '{"LockID":{"S":"lambda-task-cloud-tf-state-557187998171/lambda-task-cloud/terraform.tfstate"}}' \
            --query 'Item.LockID.S' \
            --output text 2>/dev/null || echo "")
          
          if [ ! -z "$LOCK_EXISTS" ] && [ "$LOCK_EXISTS" != "None" ]; then
            LOCK_ID=$(aws dynamodb get-item \
              --table-name lambda-task-cloud-tf-state-lock \
              --key '{"LockID":{"S":"lambda-task-cloud-tf-state-557187998171/lambda-task-cloud/terraform.tfstate"}}' \
              --output json 2>/dev/null | jq -r '.Item.Info.S' | jq -r '.ID' || echo "")
            
            if [ ! -z "$LOCK_ID" ] && [ "$LOCK_ID" != "null" ]; then
              echo "Releasing lock: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID" || true
            fi
          fi
        continue-on-error: true

